query ViewShelters(
  $filters: ShelterFilter
  $pagination: OffsetPaginationInput
  $ordering: [ShelterOrder!]! = []
) {
  shelters(filters: $filters, pagination: $pagination, ordering: $ordering) {
    totalCount
    results {
      id
      name
      heroImage
      distanceInMiles
      isPrivate
      location {
        latitude
        longitude
        place
      }
      shelterTypes {
        name
      }
    }
  }
}

query ShelterServiceCategories {
  shelterServiceCategories {
    totalCount
    results {
      id
      name
      displayName
      priority
      services {
        id
        name
        displayName
        isOther
        priority
      }
    }
  }
}

mutation CreateShelter($data: CreateShelterInput!) {
  createShelter(data: $data) {
    ... on ShelterType {
      id
      name
      status
    }
    ... on OperationInfo {
      messages {
        kind
        field
        message
      }
    }
  }
}
