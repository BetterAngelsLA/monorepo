query ViewShelter($id: ID!) {
  shelter(pk: $id) {
    bedFees
    cityCouncilDistrict
    curfew
    demographicsOther
    description
    email
    entryInfo
    heroImage {
      id
      file {
        name
        url
      }
    }
    id
    instagram
    isPrivate
    maxStay
    name
    onSiteSecurity
    fundersOther
    otherRules
    otherServices
    addNotesShelterDetails
    addNotesSleepingDetails
    overallRating
    phone
    programFees
    roomStylesOther
    shelterProgramsOther
    shelterTypesOther
    status
    subjectiveReview
    supervisorialDistrict
    totalBeds
    website
    visitorsAllowed
    emergencySurge
    exitPolicy {
      name
    }
    exitPolicyOther
    referralRequirement {
      name
    }
    accessibility {
      name
    }
    additionalContacts {
      contactName
      contactNumber
    }
    cities {
      name
    }
    demographics {
      name
    }
    entryRequirements {
      name
    }
    photos {
      id
      type
      file {
        name
        url
      }
    }
    funders {
      name
    }
    location {
      latitude
      longitude
      place
    }
    organization {
      id
      name
    }
    parking {
      name
    }
    pets {
      name
    }
    roomStyles {
      name
    }
    schedules {
      id
      scheduleType
      day
      startTime
      endTime
      startDate
      endDate
      condition
      demographic {
        name
      }
      isException
    }
    services {
      id
      displayName
      priority
      category {
        id
        displayName
        priority
      }
    }
    shelterPrograms {
      name
    }
    shelterTypes {
      name
    }
    spa {
      name
    }
    specialSituationRestrictions {
      name
    }
    storage {
      name
    }
    updatedAt
    mediaLinks {
      id
      url
      title
      mediaType
    }
  }
}
