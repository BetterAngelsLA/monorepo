query Room($id: ID!) {
  room(pk: $id) {
    id
    amenities
    lastCleanedInspected
    maintenanceFlag
    medicalRespite
    name
    notes
    status
    storage
    type
    typeOther
    accessibility {
      name
    }
    demographics {
      name
    }
    funders {
      name
    }
    shelter {
      id
    }
    pets {
      name
    }
  }
}
