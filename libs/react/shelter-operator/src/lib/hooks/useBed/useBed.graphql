query Bed($id: ID!) {
  bed(pk: $id) {
    id
    name
    status
    statusNotes
    type
    storage
    maintenanceFlag
    b7
    fees
    room {
      id
      name
      status
    }
    accessibility {
      name
    }
    demographics {
      name
    }
    funders {
      name
    }
    medicalNeeds {
      name
    }
    pets {
      name
    }
  }
}
