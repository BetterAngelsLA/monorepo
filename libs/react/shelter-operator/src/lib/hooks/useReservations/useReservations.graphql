query Reservations($shelterId: ID!) {
  reservations(filters: { shelterId: $shelterId }) {
    totalCount
    results {
      id
      status
      startDate
      checkedInAt
      checkedOutAt
      bed {
        id
        name
      }
      room {
        id
        name
      }
      clients {
        id
        isPrimary
        clientProfile {
          id
          firstName
          middleName
          lastName
          nickname
        }
      }
    }
  }
}
