query ViewSheltersByOrganization(
  $organizationId: ID!
  $name: String
  $offset: Int
  $limit: Int
  $properties: ShelterPropertyInput
) {
  adminShelters(
    filters: {
      organizations: [$organizationId]
      name: $name
      properties: $properties
    }
    ordering: [{ createdAt: DESC }]
    pagination: { offset: $offset, limit: $limit }
  ) {
    totalCount
    results {
      id
      name
      location {
        place
      }
      totalBeds
      bedsByStatus {
        available
        occupied
        reserved
        outOfService
      }
      demographics {
        name
      }
      specialSituationRestrictions {
        name
      }
      shelterTypes {
        name
      }
      city {
        name
      }
      spa {
        name
      }
    }
  }
}

query GetShelterName($id: ID!) {
  shelter(pk: $id) {
    id
    name
  }
}
