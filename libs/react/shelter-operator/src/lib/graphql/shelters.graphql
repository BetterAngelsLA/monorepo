query ViewSheltersByOrganization(
  $organizationId: ID!
  $name: String
  $offset: Int
  $limit: Int
  $properties: ShelterPropertyInput
) {
  operatorShelters(
    filters: {
      organizations: [$organizationId]
      name: $name
      properties: $properties
    }
    ordering: [{ createdAt: DESC }]
    pagination: { offset: $offset, limit: $limit }
  ) {
    totalCount
    results {
      id
      name
      location {
        place
      }
      status
      totalBeds
      bedsByStatus {
        available
        inTurnaround
        occupied
        outOfService
        reserved
      }
      demographics {
        name
      }
      specialSituationRestrictions {
        name
      }
      shelterTypes {
        name
      }
      city {
        name
      }
      spa {
        id
        name
      }
    }
  }
}

query GetShelterSummary($id: ID!) {
  operatorShelter(pk: $id) {
    id
    name
    location {
      place
    }
  }
}
