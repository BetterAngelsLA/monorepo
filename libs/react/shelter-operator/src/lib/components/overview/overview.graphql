query GetShelterOperatorOverview($shelterId: ID!) {
  operatorShelter(pk: $shelterId) {
    id
    name
    organization {
      id
      name
    }
    location {
      place
    }
    bedsByStatus {
      available
      inTurnaround
      occupied
      outOfService
      reserved
    }
    roomsByStatus {
      available
      inTurnaround
      occupied
      outOfService
      reserved
    }
  }
}
