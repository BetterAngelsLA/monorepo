query GetOperatorShelterOverview($shelterId: ID!) {
  operatorShelter(pk: $shelterId) {
    id
    name
    organization {
      id
      name
    }
    location {
      place
    }
    bedsByStatus {
      available
      occupied
      reserved
      outOfService
    }
    roomsByStatus {
      available
      reserved
      needsMaintenance
    }
  }
}
