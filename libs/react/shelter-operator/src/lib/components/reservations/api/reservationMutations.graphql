mutation CreateReservation($data: CreateReservationInput!) {
  createReservation(data: $data) {
    ... on ReservationType {
      id
      status
      startDate
      notes
      bed {
        id
        name
      }
      room {
        id
        name
      }
    }
    ... on OperationInfo {
      messages {
        kind
        field
        message
      }
    }
  }
}

mutation UpdateReservation($id: ID!, $data: UpdateReservationInput!) {
  updateReservation(id: $id, data: $data) {
    ... on ReservationType {
      id
      status
      startDate
      notes
      bed {
        id
        name
      }
      room {
        id
        name
      }
    }
    ... on OperationInfo {
      messages {
        kind
        field
        message
      }
    }
  }
}

mutation DeleteReservations($data: BulkDeleteInput!) {
  deleteReservations(data: $data) {
    ... on BulkDeleteResult {
      ids
    }
    ... on OperationInfo {
      messages {
        kind
        field
        message
      }
    }
  }
}
