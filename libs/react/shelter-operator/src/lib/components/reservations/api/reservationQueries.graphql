query GetReservation($pk: ID!) {
  reservation(pk: $pk) {
    id
    status
    startDate
    notes
    bed {
      id
      name
    }
    room {
      id
      name
    }
    clients {
      id
      isPrimary
      clientProfile {
        id
        firstName
        middleName
        lastName
        nickname
      }
    }
  }
}

query GetReservations($shelterId: ID!) {
  reservations(filters: { shelterId: $shelterId }) {
    results {
      id
      status
      startDate
      checkedInAt
      checkedOutAt
      bed {
        id
        name
      }
      room {
        id
        name
      }
      clients {
        id
        isPrimary
        clientProfile {
          id
          firstName
          middleName
          lastName
          nickname
        }
      }
    }
    totalCount
  }
}
