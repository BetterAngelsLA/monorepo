query GetRoom($id: ID!) {
  room(pk: $id) {
    id
    amenities
    lastCleanedInspected
    maintenanceFlag
    medicalRespite
    name
    notes
    status
    storage
    type
    typeOther
    accessibility {
      name
    }
    demographics {
      name
    }
    funders {
      name
    }
    shelter {
      id
    }
    pets {
      name
    }
  }
}

query GetRooms($shelterId: ID!) {
  rooms(filters: { shelterId: $shelterId }) {
    results {
      id
      name
      status
      amenities
      medicalRespite
    }
  }
}
