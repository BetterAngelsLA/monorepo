mutation CloneRoom($id: ID!, $shelterId: ID!) {
  cloneRoom(id: $id, shelterId: $shelterId) {
    ... on RoomType {
      id
      name
    }
    ... on OperationInfo {
      messages {
        kind
        field
        message
      }
    }
  }
}

mutation UpdateRoom($id: ID!, $data: UpdateRoomInput!) {
  updateRoom(id: $id, data: $data) {
    ... on RoomType {
      id
      name
      status
      type
      typeOther
    }
    ... on OperationInfo {
      messages {
        kind
        field
        message
      }
    }
  }
}

mutation DeleteRooms($ids: [ID!]!) {
  deleteRooms(ids: $ids) {
    ... on RoomType {
      id
    }
    ... on OperationInfo {
      messages {
        kind
        field
        message
      }
    }
  }
}
