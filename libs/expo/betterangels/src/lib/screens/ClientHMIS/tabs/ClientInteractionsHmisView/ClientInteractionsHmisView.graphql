query HmisListClientNotes(
  $enrollmentId: ID!
  $pagination: HmisPaginationInput = null
  $personalId: ID!
) {
  hmisListClientNotes(
    enrollmentId: $enrollmentId
    personalId: $personalId
    pagination: $pagination
  ) {
    ... on HmisClientNoteListType {
      __typename
      items {
        category
        date
        id
        note
        title
        enrollment {
          enrollmentId
        }
      }
      meta {
        currentPage
        pageCount
        perPage
        totalCount
      }
    }

    ... on HmisListClientNotesError {
      field
      message
    }
  }
}

query HmisNotes(
  $filters: HmisNoteFilter
  $pagination: OffsetPaginationInput
  $ordering: [HmisNoteOrdering!]! = []
) {
  hmisNotes(filters: $filters, pagination: $pagination, ordering: $ordering) {
    totalCount
    pageInfo {
      limit
      offset
    }
    results {
      id
      hmisId
      hmisClientProfileId
      addedDate
      lastUpdated
      title
      note
      date
      refClientProgram
      createdBy {
        id
        firstName
        lastName
      }
    }
  }
}
