query HmisNote($clientHmisId: String!, $noteHmisId: String!) {
  hmisNote(clientHmisId: $clientHmisId, noteHmisId: $noteHmisId) {
    ... on HmisNoteType {
      id
      hmisId
      addedDate
      lastUpdated
      title
      note
      date
      refClientProgram
      hmisClientProfile {
        id
        hmisId
        firstName
        lastName
      }
      createdBy {
        id
        firstName
        lastName
      }
    }
  }
}
