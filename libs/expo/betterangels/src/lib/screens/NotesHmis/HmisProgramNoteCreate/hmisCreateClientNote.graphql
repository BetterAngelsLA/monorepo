mutation CreateHmisNote($data: CreateHmisNoteInput!) {
  createHmisNote(data: $data) {
    ... on HmisNoteType {
      hmisId
      addedDate
      lastUpdated
      title
      note
      date
      refClientProgram
      hmisClientProfile {
        id
        hmisId
        firstName
        lastName
      }
      createdBy {
        id
        firstName
        lastName
      }
    }
    ... on OperationInfo {
      messages {
        kind
        field
        message
      }
    }
  }
}
