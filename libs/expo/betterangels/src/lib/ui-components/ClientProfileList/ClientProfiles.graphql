query ClientProfiles(
  $filters: ClientProfileFilter
  $pagination: OffsetPaginationInput
  $ordering: [ClientProfileOrder!]! = []
) {
  clientProfiles(
    filters: $filters
    pagination: $pagination
    ordering: $ordering
  ) {
    totalCount
    pageInfo {
      limit
      offset
    }
    results {
      id
      age
      dateOfBirth
      email
      firstName
      heightInInches
      lastName
      livingSituation
      mailingAddress
      preferredLanguage
      middleName
      nickname
      residenceAddress
      unhousedStartDate
      displayPronouns
      importantNotes
      physicalDescription
      hmisProfiles {
        id
        agency
        hmisId
      }
      profilePhoto {
        name
        url
      }
      contacts {
        id
        name
        relationshipToClient
        phoneNumber
      }
      phoneNumbers {
        id
        isPrimary
        number
      }
    }
  }
}
