mutation UpdateTask($data: UpdateTaskInput!) {
  updateTask(data: $data) {
    ... on OperationInfo {
      messages {
        kind
        field
        message
      }
    }

    ... on TaskType {
      id
      summary
      description
      status
      currentTeam {
        id
        slug
        name
      }
      updatedAt
    }
  }
}
