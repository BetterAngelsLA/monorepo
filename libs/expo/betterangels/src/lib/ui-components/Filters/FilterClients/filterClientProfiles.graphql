# input ClientProfileFilter {
#   AND: ClientProfileFilter
#   OR: ClientProfileFilter
#   NOT: ClientProfileFilter
#   DISTINCT: Boolean
#   isActive: Boolean
#   search: String
#   searchClient: ClientSearchInput
# }

# input ClientSearchInput {
#   excludedClientProfileId: String = null
#   californiaId: String = null
#   firstName: String = null
#   lastName: String = null
#   middleName: String = null
# }

query FilterClientProfiles(
  $filters: ClientProfileFilter
  $pagination: OffsetPaginationInput
  $order: ClientProfileOrder
) {
  clientProfiles(filters: $filters, pagination: $pagination, order: $order) {
    totalCount
    pageInfo {
      limit
      offset
    }
    results {
      id
      firstName
      lastName
      middleName
      nickname
    }
  }
}

