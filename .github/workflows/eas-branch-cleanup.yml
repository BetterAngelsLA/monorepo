name: 🧹 EAS Update Branch Cleanup

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: read # Required to find the last successful workflow run
      contents: read # Required for actions/checkout
    steps:
      - name: 🏗 Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔀 Track main if PR
        if: github.ref != 'refs/heads/main'
        run: git branch --track main origin/main

      - name: 🔧 Configure NX SHAs
        uses: nrwl/nx-set-shas@v4

      - name: 🔧 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.21.1'

      - name: 🧶 Setup Yarn
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          cache: 'yarn'

      - name: 📦 Install dependencies
        run: yarn install

      - name: ️ Delete EAS Branches for Affected Projects
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          BRANCH_NAME='${{ github.head_ref || github.ref_name }}'
          affected=$(yarn nx show projects --affected --withTarget eas-update)
          if [ -z "$affected" ]; then
            echo "No affected projects with eas-update target"
            exit 0
          fi
          for project in $affected; do
            echo "Deleting EAS branch for project: $project"
            cd apps/$project
            npx eas branch:delete --non-interactive "$BRANCH_NAME"
            cd -
          done
