# Maestro E2E tests — orchestrated from GitHub Actions.
#
# Handles all setup that needs GitHub Secrets and NX monorepo tooling:
#   1. Compute fingerprint (needs EXPO_PUBLIC_* secrets)
#   2. Find existing preview builds (via NX build-list target)
#   3. Publish EAS Update (via NX eas-update target)
#   4. Trigger the EAS Maestro workflow (eas workflow:run)
#
# The EAS workflow (.eas/workflows/e2e-test.yml) only runs Maestro tests.
#
# Triggers:
#   - Comment "/run-e2e" on a PR
#   - Manually via the Actions tab (workflow_dispatch)
#   - Merge queue (automatic gating)
name: 🧪 Maestro E2E Tests

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to test'
        required: true
        type: number
  merge_group:
    types: [checks_requested]

jobs:
  e2e:
    if: >-
      github.event_name == 'merge_group'
      || github.event_name == 'workflow_dispatch'
      || (
        github.event.issue.pull_request
        && startsWith(github.event.comment.body, '/run-e2e')
        && contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
      )
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: 🚀 React to comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: 🔍 Resolve PR ref
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'issue_comment') {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
              });
              core.setOutput('ref', pr.head.ref);
              core.setOutput('sha', pr.head.sha);
            } else if (context.eventName === 'workflow_dispatch') {
              const prNumber = ${{ github.event.inputs.pr_number || 0 }};
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              core.setOutput('ref', pr.head.ref);
              core.setOutput('sha', pr.head.sha);
            } else {
              // merge_group — ref and sha come from the event directly
              core.setOutput('ref', process.env.GITHUB_REF_NAME);
              core.setOutput('sha', process.env.GITHUB_SHA);
            }

      - name: 🏗 Check out repo
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.sha }}
          fetch-depth: 0

      - name: ⎔ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.21.1'
          cache: yarn

      - name: 📦 Install dependencies
        run: yarn install

      - name: 🧪 Run E2E orchestration
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          BRANCH_NAME: ${{ steps.pr.outputs.ref }}
          EXPO_PUBLIC_IOS_GOOGLEMAPS_APIKEY: ${{ secrets.EXPO_PUBLIC_IOS_GOOGLEMAPS_APIKEY }}
          EXPO_PUBLIC_ANDROID_GOOGLEMAPS_APIKEY: ${{ secrets.EXPO_PUBLIC_ANDROID_GOOGLEMAPS_APIKEY }}
          EXPO_PUBLIC_NEW_RELIC_MOBILE_LICENSE_KEY_IOS: ${{ secrets.EXPO_PUBLIC_NEW_RELIC_MOBILE_LICENSE_KEY_IOS }}
          EXPO_PUBLIC_NEW_RELIC_MOBILE_LICENSE_KEY_ANDROID: ${{ secrets.EXPO_PUBLIC_NEW_RELIC_MOBILE_LICENSE_KEY_ANDROID }}
        run: |
          npx ts-node --project tools/tsconfig.tools.json tools/scripts/eas-e2e.ts --project betterangels
