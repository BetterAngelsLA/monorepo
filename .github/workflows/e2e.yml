# Trigger Maestro E2E tests on EAS Workflows.
#
# The actual tests run on EAS via apps/betterangels/.eas/workflows/e2e-test.yml,
# triggered by the "run-e2e" label (through the Expo GitHub App).
#
# This GitHub Actions workflow just provides two convenience triggers:
#   - Comment "/run-e2e" on a PR
#   - Manually via the Actions tab (workflow_dispatch)
#
# Both simply toggle the "run-e2e" label, which the Expo GitHub App picks up
# and triggers the EAS workflow with full github.* context + GITHUB_TOKEN.
name: 🧪 Maestro E2E Tests

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to test'
        required: true
        type: number

jobs:
  trigger-e2e:
    if: >-
      github.event_name == 'workflow_dispatch'
      || (
        github.event.issue.pull_request
        && startsWith(github.event.comment.body, '/run-e2e')
        && contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
      )
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: 🚀 React to comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: 🏷️ Toggle run-e2e label
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.issue?.number || ${{ github.event.inputs.pr_number || 0 }};

            // Remove first (in case it already exists — re-adding is a no-op)
            try {
              await github.rest.issues.removeLabel({ owner, repo, issue_number, name: 'run-e2e' });
            } catch {}

            // Brief pause so GitHub processes the removal before we re-add
            await new Promise(r => setTimeout(r, 2000));

            // Add label — this triggers the EAS workflow via the Expo GitHub App
            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['run-e2e'] });
