appId: la.betterangels.dev.app
platform: ${MAESTRO_PLATFORM}
---
# Determine launch environment and compute deep link
# Local runs provide EXPO_APP_DEEPLINK (Metro dev server)
# CI runs derive a link from Expo update group
- evalScript: |
    output.isLocal =
      EXPO_APP_DEEPLINK != null && EXPO_APP_DEEPLINK != ""

# Resolve deep link depending on environment
- evalScript: |
    output.deepLink =
      output.isLocal
        ? EXPO_APP_DEEPLINK
        : `betterangels-dev://expo-development-client/?url=https://u.expo.dev/${MAESTRO_PROJECT_ID}/group/${MAESTRO_GROUP_ID}?platform=${MAESTRO_PLATFORM}%26disableOnboarding%3D1`

- openLink: ${output.deepLink}
# Loop until Better Angels appears or max 10 attempts; kill/relaunch if Reload is seen
- evalScript: ${output.counter = 0}
- repeat:
    while:
      true: ${output.counter < 10}
      notVisible: 'Better Angels'
    commands:
      - extendedWaitUntil:
          visible: 'Reload'
          timeout: 1000
          optional: true
      - runFlow:
          when:
            visible: 'Reload'
          commands:
            - takeScreenshot: error-restart-kill
            - killApp
            - openLink: ${output.deepLink}
      - runFlow:
          when:
            platform: ios
            visible: 'Open'
          commands:
            - tapOn: 'Open'
      - evalScript: ${output.counter = output.counter + 1}

- assertVisible: 'Better Angels'
- assertVisible: 'HMIS'
- tapOn:
    id: 'better-angels-login'
- assertVisible: 'Welcome!'
