# Maestro E2E tests for betterangels.
#
# This workflow runs device-based Maestro tests.
# GitHub Actions handles orchestration (fingerprint computation, build triggering,
# update publishing) where GitHub Secrets and NX monorepo tooling are available.
#
# Build IDs are passed directly. If a build is still in progress, Maestro will
# wait for it to complete before running tests.
#
# Triggered via: eas workflow:run (from GitHub Actions)
name: e2e-test

on:
  workflow_dispatch:
    inputs:
      android_build_id:
        type: string
        required: true
        description: 'EAS Build ID for Android'
      ios_build_id:
        type: string
        required: true
        description: 'EAS Build ID for iOS'
      update_group_id:
        type: string
        required: true
        description: 'EAS Update group ID'

jobs:
  maestro_android_test:
    type: maestro
    env:
      # Inner update URL must be percent-encoded so the dev client parses it correctly.
      # disableOnboarding is an outer param for the dev client, not the EAS server.
      MAESTRO_DEEPLINK: betterangels-dev://expo-development-client/?url=https%3A%2F%2Fu.expo.dev%2F53171ba4-60ca-40cb-b3e6-b0c2393677b8%2Fgroup%2F${{ inputs.update_group_id }}%3Fplatform%3Dandroid&disableOnboarding=1
    params:
      build_id: ${{ inputs.android_build_id }}
      flow_path: ['.maestro/tests/landing.yml']

  maestro_ios_test:
    type: maestro
    env:
      MAESTRO_DEEPLINK: betterangels-dev://expo-development-client/?url=https%3A%2F%2Fu.expo.dev%2F53171ba4-60ca-40cb-b3e6-b0c2393677b8%2Fgroup%2F${{ inputs.update_group_id }}%3Fplatform%3Dios&disableOnboarding=1
    params:
      build_id: ${{ inputs.ios_build_id }}
      flow_path: ['.maestro/tests/landing.yml']
