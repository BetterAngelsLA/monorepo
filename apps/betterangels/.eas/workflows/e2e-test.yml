# Maestro E2E tests for betterangels.
#
# This workflow runs device-based Maestro tests.
# GitHub Actions handles orchestration (fingerprint computation, build triggering,
# update publishing) where GitHub Secrets and NX monorepo tooling are available.
#
# Build IDs are passed directly. If a build is still in progress, Maestro will
# wait for it to complete before running tests.
#
# GitHub commit status is posted at the start (pending) and end (success/failure)
# using metadata from .env written by eas-e2e.ts.
# If GITHUB_STATUS_TOKEN (EAS secret, PAT with repo:status scope) is not set,
# status posting is skipped — tests still run.
#
# Triggered via: eas workflow:run (from GitHub Actions)
name: e2e-test

on:
  workflow_dispatch:
    inputs:
      android_build_id:
        type: string
        required: true
        description: 'EAS Build ID for Android'
      ios_build_id:
        type: string
        required: true
        description: 'EAS Build ID for iOS'
      update_group_id:
        type: string
        required: true
        description: 'EAS Update group ID'
      MAESTRO_BA_USER_EMAIL:
        type: string
        required: true
      MAESTRO_BA_USER_PASSWORD:
        type: string
        required: true

jobs:
  set_pending_github_status:
    env:
      EAS_WORKFLOW_URL: ${{ workflow.url }}
    steps:
      - id: set_pending_status
        run: |
          set -uo pipefail

          WORK_DIR="/home/expo/workingdir/temporary-custom-build/apps/betterangels"
          GITHUB_REPOSITORY="$(grep '^GITHUB_REPOSITORY=' ${WORK_DIR}/.env | cut -d '=' -f2- || true)"
          GITHUB_STATUS_SHA="$(grep '^GITHUB_STATUS_SHA=' ${WORK_DIR}/.env | cut -d '=' -f2- || true)"
          GITHUB_STATUS_CONTEXT="$(grep '^GITHUB_STATUS_CONTEXT=' ${WORK_DIR}/.env | cut -d '=' -f2- || true)"
          EAS_ACCOUNT="$(grep '^EAS_ACCOUNT=' ${WORK_DIR}/.env | cut -d '=' -f2- || true)"
          EAS_PROJECT_SLUG="$(grep '^EAS_PROJECT_SLUG=' ${WORK_DIR}/.env | cut -d '=' -f2- || true)"
          # Prefer EAS-provided env var (EAS secret), fallback to .env if present.
          GITHUB_STATUS_TOKEN="${GITHUB_STATUS_TOKEN:-$(grep '^GITHUB_STATUS_TOKEN=' ${WORK_DIR}/.env | cut -d '=' -f2- || true)}"

          if [ -z "${GITHUB_REPOSITORY:-}" ] || [ -z "${GITHUB_STATUS_SHA:-}" ] || [ -z "${GITHUB_STATUS_CONTEXT:-}" ]; then
            echo "⚠️  Missing GITHUB_REPOSITORY / GITHUB_STATUS_SHA / GITHUB_STATUS_CONTEXT; skipping commit status."
            exit 0
          fi
          if [ -z "${GITHUB_STATUS_TOKEN:-}" ]; then
            echo "⚠️  Missing GITHUB_STATUS_TOKEN; skipping commit status."
            exit 0
          fi

          TARGET_URL=""
          if [ -n "${EAS_ACCOUNT:-}" ] && [ -n "${EAS_PROJECT_SLUG:-}" ]; then
            TARGET_URL="${EAS_WORKFLOW_URL}"
          fi

          export GITHUB_STATUS_CONTEXT TARGET_URL

          BODY="$(python3 - <<'PY'
          import json, os
          payload = {
            "state": "pending",
            "context": os.environ["GITHUB_STATUS_CONTEXT"],
            "description": "E2E tests running on EAS",
          }
          target_url = os.environ.get("TARGET_URL", "").strip()
          if target_url:
            payload["target_url"] = target_url
          print(json.dumps(payload))
          PY
          )"

          curl --fail-with-body -sS \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Authorization: Bearer ${GITHUB_STATUS_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_STATUS_SHA}" \
            -d "${BODY}" \
            >/dev/null \
            || { echo "⚠️  Failed to post pending status (curl error); continuing."; exit 0; }

          echo "Posted pending status ${GITHUB_STATUS_CONTEXT} for ${GITHUB_REPOSITORY}@${GITHUB_STATUS_SHA}"

  maestro_android_test:
    needs: [set_pending_github_status]
    type: maestro
    env:
      MAESTRO_DEEPLINK: betterangels-dev://expo-development-client/?url=https://u.expo.dev/53171ba4-60ca-40cb-b3e6-b0c2393677b8/group/${{ inputs.update_group_id }}?platform=android%26disableOnboarding%3D1
      MAESTRO_BA_USER_EMAIL: ${{ inputs.MAESTRO_BA_USER_EMAIL }}
      MAESTRO_BA_USER_PASSWORD: ${{ inputs.MAESTRO_BA_USER_PASSWORD }}
    params:
      build_id: ${{ inputs.android_build_id }}
      flow_path: ['.maestro/tests/']

  maestro_ios_test:
    needs: [set_pending_github_status]
    type: maestro
    env:
      MAESTRO_DEEPLINK: betterangels-dev://expo-development-client/?url=https://u.expo.dev/53171ba4-60ca-40cb-b3e6-b0c2393677b8/group/${{ inputs.update_group_id }}?platform=ios%26disableOnboarding%3D1
      MAESTRO_BA_USER_EMAIL: ${{ inputs.MAESTRO_BA_USER_EMAIL }}
      MAESTRO_BA_USER_PASSWORD: ${{ inputs.MAESTRO_BA_USER_PASSWORD }}
    params:
      build_id: ${{ inputs.ios_build_id }}
      flow_path: ['.maestro/tests/']

  set_final_github_status:
    after: [maestro_android_test, maestro_ios_test]
    env:
      IOS_STATUS: ${{ after.maestro_ios_test.status }}
      ANDROID_STATUS: ${{ after.maestro_android_test.status }}
      EAS_WORKFLOW_URL: ${{ workflow.url }}
    steps:
      - id: set_final_status
        run: |
          set -uo pipefail

          WORK_DIR="/home/expo/workingdir/temporary-custom-build/apps/betterangels"
          GITHUB_REPOSITORY="$(grep '^GITHUB_REPOSITORY=' ${WORK_DIR}/.env | cut -d '=' -f2- || true)"
          GITHUB_STATUS_SHA="$(grep '^GITHUB_STATUS_SHA=' ${WORK_DIR}/.env | cut -d '=' -f2- || true)"
          GITHUB_STATUS_CONTEXT="$(grep '^GITHUB_STATUS_CONTEXT=' ${WORK_DIR}/.env | cut -d '=' -f2- || true)"
          EAS_ACCOUNT="$(grep '^EAS_ACCOUNT=' ${WORK_DIR}/.env | cut -d '=' -f2- || true)"
          EAS_PROJECT_SLUG="$(grep '^EAS_PROJECT_SLUG=' ${WORK_DIR}/.env | cut -d '=' -f2- || true)"
          # Prefer EAS-provided env var (EAS secret), fallback to .env if present.
          GITHUB_STATUS_TOKEN="${GITHUB_STATUS_TOKEN:-$(grep '^GITHUB_STATUS_TOKEN=' ${WORK_DIR}/.env | cut -d '=' -f2- || true)}"

          echo "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}"
          echo "GITHUB_STATUS_SHA=${GITHUB_STATUS_SHA}"
          echo "GITHUB_STATUS_CONTEXT=${GITHUB_STATUS_CONTEXT}"

          echo "ANDROID_STATUS=${ANDROID_STATUS:-}"
          echo "IOS_STATUS=${IOS_STATUS:-}"

          if [ -z "${GITHUB_REPOSITORY:-}" ] || [ -z "${GITHUB_STATUS_SHA:-}" ] || [ -z "${GITHUB_STATUS_CONTEXT:-}" ]; then
            echo "⚠️  Missing GITHUB_REPOSITORY / GITHUB_STATUS_SHA / GITHUB_STATUS_CONTEXT; skipping commit status."
            exit 0
          fi
          if [ -z "${GITHUB_STATUS_TOKEN:-}" ]; then
            echo "⚠️  Missing GITHUB_STATUS_TOKEN; skipping commit status."
            exit 0
          fi

          if [ "${ANDROID_STATUS}" = "success" ] && [ "${IOS_STATUS}" = "success" ]; then
            STATE="success"
            DESC="E2E tests passed"
          else
            STATE="failure"
            DESC="E2E tests failed"
          fi

          TARGET_URL=""
          if [ -n "${EAS_ACCOUNT:-}" ] && [ -n "${EAS_PROJECT_SLUG:-}" ]; then
            TARGET_URL="${EAS_WORKFLOW_URL}"
          fi

          export STATE DESC GITHUB_STATUS_CONTEXT TARGET_URL
          BODY="$(python3 - <<'PY'
          import json, os
          payload = {
            "state": os.environ["STATE"],
            "context": os.environ["GITHUB_STATUS_CONTEXT"],
            "description": os.environ["DESC"],
          }
          target_url = os.environ.get("TARGET_URL", "").strip()
          if target_url:
            payload["target_url"] = target_url
          print(json.dumps(payload))
          PY
          )"

          curl --fail-with-body -sS \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Authorization: Bearer ${GITHUB_STATUS_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_STATUS_SHA}" \
            -d "${BODY}" \
            >/dev/null \
            || { echo "⚠️  Failed to post final status (curl error); continuing."; exit 0; }

          echo "Posted ${STATE} status ${GITHUB_STATUS_CONTEXT} for ${GITHUB_REPOSITORY}@${GITHUB_STATUS_SHA}"
