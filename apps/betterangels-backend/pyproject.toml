[tool.coverage.run]
branch = true
source = ["betterangels_backend"]

[tool.coverage.report]
exclude_lines = ["if TYPE_CHECKING:"]
show_missing = true

[project]
name = "betterangels-backend"
version = "1.0.0"
description = "Automatically generated by Nx."
requires-python = ">=3.14,<3.15"
dependencies = [
    "celery[redis]>=5.6.2,<6",
    "celery-redbeat>=2.3.3,<3",
    "cryptography>=48.0.1,<49",
    "deepdiff>=8.6.1,<9",
    "dj-places>=5.2.1,<6",
    "django>=6.0.2,<7",
    "django-admin-async-upload",
    "django-admin-interface>=0.32.0,<1",
    "django-admin-rangefilter>=0.13.5,<0.14",
    "django-admin-sortable2>=2.3.1,<3",
    "django-allauth>=65.14.0,<66",
    "django-annoying>=0.10.8,<0.11",
    "django-choices-field>=4.0.0,<5",
    "django-ckeditor-5>=0.2.19,<0.3",
    "django-cleanup>=9.0.0,<10",
    "django-clone>=5.5.0,<6",
    "django-cors-headers>=4.7.0,<5",
    "django-environ>=0.12.0,<0.13",
    "django-extensions>=4.1,<5",
    "django-guardian>=3.0.3,<4",
    "django-import-export>=4.4.0,<5",
    "django-organizations>=2.5.0,<3",
    "django-pghistory>=3.9.1,<4",
    "django-phonenumber-field[phonenumbers]>=8.4.0,<9",
    "django-post-office>=3.11.0,<4",
    "django-select2>=8.4.8,<9",
    "django-ses>=4.6.0,<5",
    "django-storages[s3]>=1.14.6,<2",
    "django-structlog>=10.0.0,<11",
    "django-waffle>=5.0.0,<6",
    "djangorestframework>=3.16.0,<4",
    "gunicorn[gevent]>=25.1.0,<26",
    "hiredis>=3.3.0,<4",
    "newrelic",
    "psycopg>=3.3.2,<4",
    "pyjwt>=2.11.0,<3",
    "python-magic>=0.4.27,<0.5",
    "requests>=2.32.5,<3",
    "strawberry-graphql-django>=0.86.1,<1",
    "whitenoise>=6.9.0,<7",
]

# Pinned to merge commit of PR #1760 (ExecutionContext.errors -> collected_errors).
# The fix is on main but not yet in any PyPI release.
# TODO: switch back to PyPI when >= 13.2 is released.
[tool.uv.sources]
newrelic = { git = "https://github.com/newrelic/newrelic-python-agent.git", rev = "825d7bd3dd56b86576324d6e3f07dd2e7008e6cf" }
django-admin-async-upload = { git = "https://github.com/BetterAngelsLA/django-admin-async-upload", rev = "cfa824d7d390c9b500ea735ecfd5aa546c8165cd" }

[dependency-groups]
dev = [
    "pytest>=9,<10",
    "pytest-django>=4,<5",
]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "betterangels_backend.settings"
python_files = ["test_*.py", "*_test.py"]
addopts = "--reuse-db"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["betterangels_backend"]
